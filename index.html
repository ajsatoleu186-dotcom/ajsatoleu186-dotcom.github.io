<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OronymKZ — Trilingual Digital Registry</title>
    <style>
        :root { --main: #2c3e50; --gold: #d4af37; --kz: #00afca; --ru: #e74c3c; --en: #2ecc71; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; background: #f4f4f9; color: #333; line-height: 1.6; }
        
        header { background: var(--main); color: white; padding: 50px 20px; text-align: center; border-bottom: 5px solid var(--gold); }
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }

        /* Тілдік ауыстырғыш макеті */
        .search-section { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin: -50px auto 30px; position: relative; }
        input { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 10px; font-size: 1.1rem; box-sizing: border-box; }

        /* Ороним картасы */
        .card { background: white; border-radius: 20px; overflow: hidden; margin-bottom: 50px; box-shadow: 0 15px 40px rgba(0,0,0,0.08); }
        .card-img { width: 100%; height: 400px; background-size: cover; background-position: center; border-bottom: 5px solid var(--gold); }
        
        .card-content { padding: 40px; }
        .trilingual-header { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 30px; border-bottom: 2px dashed #eee; padding-bottom: 20px; }
        
        .lang-block { padding: 10px; border-radius: 10px; }
        .qaz-b { border-left: 4px solid var(--kz); background: #f0fbff; }
        .rus-b { border-left: 4px solid var(--ru); background: #fff5f5; }
        .eng-b { border-left: 4px solid var(--en); background: #f5fff8; }

        .label { font-size: 0.8rem; font-weight: bold; text-transform: uppercase; color: #777; display: block; margin-bottom: 5px; }
        .name { font-size: 1.4rem; font-weight: 800; margin-bottom: 10px; display: block; }
        .lat-name { font-style: italic; color: var(--gold); font-weight: bold; }

        /* Мағынасы бөлімі */
        .description-section { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 25px; margin-top: 20px; }
        .desc-text { font-size: 0.95rem; text-align: justify; }
        .desc-text h4 { margin-top: 0; color: var(--main); border-bottom: 1px solid #ddd; padding-bottom: 5px; }

        @media (max-width: 900px) {
            .trilingual-header, .description-section { grid-template-columns: 1fr; }
            .card-img { height: 250px; }
        }
    </style>
</head>
<body>

<header>
    <h1>Qazaq Oronyms: Etymological Registry</h1>
    <p>Қазақ | Русский | English</p>
</header>

<div class="container">
    <div class="search-section">
        <input type="text" id="searchInput" placeholder="Іздеу / Поиск / Search..." oninput="searchFunc()">
    </div>

    <div id="results">
        <!-- Оронимдер тізімі -->
    </div>
</div>

<script>
    const data = [
        {
            img: "muz.jpg",
            qaz: { name: "Мұзтау", lat: "Mūztau", desc: "Алтайдың ең биік шыңы. Атау таудың басындағы мәңгілік мұздар мен мұздықтарға байланысты қойылған. Көшпенділер үшін қасиетті мекен." },
            rus: { name: "Белуха", lat: "Belukha", desc: "Высшая точка Алтая. Русское название происходит от обильного снежного покрова. Традиционное казахское название — Мұзтау (Ледяная гора)." },
            eng: { name: "Mount Belukha", lat: "Muztau", desc: "The highest peak of the Altai Mountains. The English/Russian name refers to its white snow, while the native name Muztau means 'Ice Mountain'." }
        },
        {
            img: "ile.jpg",
            qaz: { name: "Іле Алатауы", lat: "İle Alatauy", desc: "Тянь-Шань тау жүйесінің солтүстік бөлігі. Атау Іле өзенінің алқабында орналасқандықтан берілген. 'Алатау' — шұбар, қарлы тау дегенді білдіреді." },
            rus: { name: "Заилийский Алатау", lat: "Trans-Ili Alatau", desc: "Горный хребет на северо-западе Тянь-Шаня. Название 'Заилийский' было дано переселенцами, видевшими горы 'за рекой Или'." },
            eng: { name: "Trans-Ili Alatau", lat: "Ile Alatauy", desc: "Part of the Northern Tian Shan. The colonial name 'Trans-Ili' refers to its position beyond the Ili River. Native name is Ile Alatauy." }
        },
        {
            img: "bura.jpg",
            qaz: { name: "Бурабай", lat: "Burabai", desc: "Сарыарқаның інжу-маржаны. Атау киелі 'Бура' (түйе) туралы аңызбен байланысты. Ол елді жаудан қорғап, қауіп төнгенде белгі берген." },
            rus: { name: "Боровое", lat: "Borovoye", desc: "Курортная зона в Казахстане. Название 'Боровое' происходит от слова 'бор' (сосновый лес). Казахское название Бурабай связано с легендой о верблюде." },
            eng: { name: "Burabay", lat: "Burabai", desc: "Known as the Pearl of Kazakhstan. The name originates from a legend about a sacred 'Bura' (camel) that warned locals of approaching danger." }
        },
        {
            img: "kokshetau.jpg",
            qaz: { name: "Көкшетау", lat: "Kökşetau", desc: "Солтүстік Қазақстандағы таулы аймақ. Атау таудың алыстан көгілдір болып көрінуіне байланысты 'Көкше' және 'Тау' сөздерінен құралған." },
            rus: { name: "Кокчетав", lat: "Kokshetau", desc: "Искаженная транслитерация казахского названия. Буквально означает 'Голубоватая гора' из-за атмосферной дымки, придающей горам синий оттенок." },
            eng: { name: "Kokshetau", lat: "Kökşetau", desc: "The name means 'Bluish Mountain'. The Russian version 'Kokchetav' is a phonetic distortion of the original Kazakh oronym." }
        }
    ];

    function searchFunc() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const results = document.getElementById('results');
        results.innerHTML = "";

        data.filter(item => 
            item.qaz.name.toLowerCase().includes(query) || 
            item.rus.name.toLowerCase().includes(query) ||
            item.eng.name.toLowerCase().includes(query)
        ).forEach(obj => {
            results.innerHTML += `
                <div class="card">
                    <div class="card-img" style="background-image: url('${obj.img}')"></div>
                    <div class="card-content">
                        <div class="trilingual-header">
                            <div class="lang-block qaz-b">
                                <span class="label">Qazaq tili</span>
                                <span class="name">${obj.qaz.name}</span>
                                <span class="lat-name">${obj.qaz.lat}</span>
                            </div>
                            <div class="lang-block rus-b">
                                <span class="label">Русский язык</span>
                                <span class="name">${obj.rus.name}</span>
                                <span class="lat-name">${obj.rus.lat}</span>
                            </div>
                            <div class="lang-block eng-b">
                                <span class="label">English Language</span>
                                <span class="name">${obj.eng.name}</span>
                                <span class="lat-name">${obj.eng.lat}</span>
                            </div>
                        </div>
                        <div class="description-section">
                            <div class="desc-text">
                                <h4>Мағынасы</h4>
                                <p>${obj.qaz.desc}</p>
                            </div>
                            <div class="desc-text">
                                <h4>Значение</h4>
                                <p>${obj.rus.desc}</p>
                            </div>
                            <div class="desc-text">
                                <h4>Etymology</h4>
                                <p>${obj.eng.desc}</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        });
    }

    searchFunc();
</script>

</body>
</html>
